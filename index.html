<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#E8291C">
<title>Nomad — My Trips</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --red: #E8291C;
    --red-dark: #C0200F;
    --white: #FFFFFF;
    --off-white: #F7F3F0;
    --ink: #1A0A08;
    --ink-mid: #5C3030;
    --ink-light: #A07070;
    --border: rgba(232,41,28,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  .home-hero { width: 100%; display: block; line-height: 0; }
  .home-hero svg { width: 100%; height: auto; display: block; }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    padding: 24px 20px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .trip-card {
    display: block;
    margin: 0 20px 16px;
    background: var(--white);
    border-left: 5px solid var(--red);
    box-shadow: 0 2px 20px rgba(232,41,28,0.12);
    cursor: pointer;
    transition: transform 0.12s;
    text-decoration: none;
    overflow: hidden;
    position: relative;
  }
  .trip-card:active { transform: scale(0.99); }

  .trip-cover { width: 100%; line-height: 0; display: block; }
  .trip-cover svg { width: 100%; height: auto; display: block; }

  .trip-body { padding: 14px 16px 46px; }

  .trip-body__top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .trip-dates {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink-mid);
    text-transform: uppercase;
  }

  .trip-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 2px;
  }
  .badge--upcoming { background: #FFF0EF; color: var(--red); border: 1px solid rgba(232,41,28,0.2); }
  .badge--active   { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
  .badge--complete { background: var(--off-white); color: var(--ink-light); border: 1px solid var(--border); }

  .trip-cities { display: flex; gap: 5px; flex-wrap: wrap; }

  .city-pill {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--off-white);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 9px;
    letter-spacing: 0.02em;
  }

  .trip-arrow {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-card {
    margin: 0 20px 12px;
    border: 2px dashed var(--border);
    padding: 22px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0.5;
  }
  .add-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .add-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 800;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .add-sub { font-size: 11px; font-weight: 500; color: var(--ink-light); margin-top: 3px; }

  .footer {
    padding: 28px 20px 52px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
    opacity: 0.35;
  }
</style>
</head>
<body>

<!-- ── HERO ── -->
<div class="home-hero">
  <svg viewBox="0 0 430 310" xmlns="http://www.w3.org/2000/svg" style="font-family:'Barlow Condensed',sans-serif;">
    <defs>
      <radialGradient id="heroGlow" cx="100%" cy="100%" r="70%">
        <stop offset="0%" stop-color="#C0200F" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#E8291C" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="heroGlow2" cx="0%" cy="0%" r="50%">
        <stop offset="0%" stop-color="#C0200F" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#E8291C" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="430" height="310" fill="#E8291C"/>
    <rect width="430" height="310" fill="url(#heroGlow)"/>
    <rect width="430" height="310" fill="url(#heroGlow2)"/>

    <!-- Globe grid -->
    <line x1="0" y1="155" x2="430" y2="155" stroke="rgba(0,0,0,0.08)" stroke-width="0.75"/>
    <line x1="0" y1="78"  x2="430" y2="78"  stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
    <line x1="0" y1="232" x2="430" y2="232" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
    <line x1="215" y1="0" x2="215" y2="310" stroke="rgba(0,0,0,0.08)" stroke-width="0.75"/>
    <line x1="108" y1="0" x2="108" y2="310" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="322" y1="0" x2="322" y2="310" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <ellipse cx="215" cy="155" rx="110" ry="148" stroke="rgba(0,0,0,0.06)" stroke-width="0.75" fill="none"/>
    <ellipse cx="215" cy="155" rx="195" ry="148" stroke="rgba(0,0,0,0.06)" stroke-width="0.75" fill="none"/>

    <!-- Flight arc -->
    <path d="M 24 252 Q 215 70 406 252" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
    <circle cx="24"  cy="252" r="3.5" fill="white" opacity="0.65"/>
    <circle cx="406" cy="252" r="3.5" fill="white" opacity="0.65"/>
    <text x="32"  y="256" font-size="8" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="0.12em">NYC</text>
    <text x="364" y="256" font-size="8" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="0.12em">EUR</text>

    <!-- Eyebrow -->
    <text x="30" y="58" font-size="10" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="0.22em">TRAVEL COMPANION</text>

    <!-- Wordmark -->
    <text x="24" y="170" font-size="118" font-weight="800" font-style="italic" fill="white" letter-spacing="-0.02em">NOMAD</text>

    <!-- Name -->
    <text x="30" y="192" font-size="12" font-weight="600" fill="rgba(255,255,255,0.48)" letter-spacing="0.12em">PATRICIA GERMAIN</text>

    <!-- Divider -->
    <line x1="30" y1="214" x2="400" y2="214" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Stats -->
    <text x="82"  y="240" font-size="30" font-weight="800" fill="white" text-anchor="middle">1</text>
    <text x="82"  y="256" font-size="8"  font-weight="700" fill="rgba(255,255,255,0.48)" text-anchor="middle" letter-spacing="0.14em">TRIP</text>

    <line x1="148" y1="220" x2="148" y2="262" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <text x="215" y="240" font-size="30" font-weight="800" fill="white" text-anchor="middle">2</text>
    <text x="215" y="256" font-size="8"  font-weight="700" fill="rgba(255,255,255,0.48)" text-anchor="middle" letter-spacing="0.14em">COUNTRIES</text>

    <line x1="282" y1="220" x2="282" y2="262" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <text x="349" y="240" font-size="30" font-weight="800" fill="white" text-anchor="middle">4</text>
    <text x="349" y="256" font-size="8"  font-weight="700" fill="rgba(255,255,255,0.48)" text-anchor="middle" letter-spacing="0.14em">CITIES</text>
  </svg>
</div>

<!-- ── UPCOMING ── -->
<div class="section-label">Upcoming</div>

<!-- ── PARIS & PORTUGAL CARD ── -->
<a href="summer-2026.html" class="trip-card">
  <div class="trip-cover">
    <svg viewBox="0 0 390 210" xmlns="http://www.w3.org/2000/svg" style="font-family:'Barlow Condensed',sans-serif;">
      <defs>
        <radialGradient id="cardGlow" cx="90%" cy="90%" r="60%">
          <stop offset="0%" stop-color="#E8291C" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#1A0A08" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <rect width="390" height="210" fill="#1A0A08"/>
      <rect width="390" height="210" fill="url(#cardGlow)"/>

      <!-- Grid -->
      <line x1="0" y1="105" x2="390" y2="105" stroke="rgba(232,41,28,0.07)" stroke-width="0.75"/>
      <line x1="195" y1="0" x2="195" y2="210" stroke="rgba(232,41,28,0.07)" stroke-width="0.75"/>

      <!-- EUROPE watermark -->
      <text x="12" y="158" font-size="96" font-weight="800" font-style="italic" fill="rgba(255,255,255,0.035)" letter-spacing="-0.02em">EUROPE</text>

      <!-- Destination -->
      <text x="20" y="74"  font-size="52" font-weight="800" font-style="italic" fill="white" letter-spacing="-0.01em">PARIS &amp;</text>
      <text x="20" y="128" font-size="52" font-weight="800" font-style="italic" fill="white" letter-spacing="-0.01em">PORTUGAL</text>

      <!-- Flight path -->
      <path d="M 22 178 Q 195 152 368 178" stroke="#E8291C" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.85"/>
      <circle cx="22"  cy="178" r="3" fill="#E8291C"/>
      <circle cx="368" cy="178" r="3" fill="#E8291C"/>
      <text x="29"  y="191" font-size="8" font-weight="700" fill="rgba(255,255,255,0.38)" letter-spacing="0.1em">JFK</text>
      <text x="339" y="191" font-size="8" font-weight="700" fill="rgba(255,255,255,0.38)" letter-spacing="0.1em">OPO</text>

      <!-- Year badge -->
      <rect x="320" y="14" width="54" height="23" fill="#E8291C" rx="2"/>
      <text x="347" y="29" font-size="12" font-weight="800" fill="white" text-anchor="middle" letter-spacing="0.06em">2026</text>
    </svg>
  </div>

  <div class="trip-body">
    <div class="trip-body__top">
      <div class="trip-dates">Jul 7 – Jul 15 · 8 nights</div>
      <div class="trip-badge badge--upcoming">Upcoming</div>
    </div>
    <div class="trip-cities">
      <span class="city-pill">Paris</span>
      <span class="city-pill">Lagos</span>
      <span class="city-pill">Faro</span>
      <span class="city-pill">Porto</span>
    </div>
  </div>

  <div class="trip-arrow">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2 6h8M6 2l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</a>

<!-- ── ADD TRIP ── -->
<div class="add-card">
  <div class="add-icon">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 2v12M2 8h12" stroke="#A07070" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div>
    <div class="add-title">Add a trip</div>
    <div class="add-sub">Your next adventure goes here</div>
  </div>
</div>

<div class="footer">Nomad · Travel Companion</div>

</body>
</html>
