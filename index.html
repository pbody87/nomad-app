<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1A0A08">
<title>Patty — My Trips</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --red: #E8291C;
    --red-dark: #C0200F;
    --red-deeper: #8B1208;
    --white: #FFFFFF;
    --off-white: #F7F3F0;
    --ink: #1A0A08;
    --ink-mid: #5C3030;
    --ink-light: #A07070;
    --border: rgba(232,41,28,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    padding: 52px 20px 20px;
    background: var(--red);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2px;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px;
    font-weight: 800;
    font-style: italic;
    color: var(--white);
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }

  .header-title span { color: rgba(255,255,255,0.65); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    padding: 24px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── TRIP CARD ── */
  .trip-card {
    margin: 0 20px 12px;
    background: var(--white);
    border-left: 5px solid var(--red);
    box-shadow: 0 2px 16px rgba(232,41,28,0.10);
    cursor: pointer;
    transition: transform 0.12s;
    text-decoration: none;
    display: block;
    overflow: hidden;
    position: relative;
  }

  .trip-card:active { transform: scale(0.99); }

  .trip-card--complete { border-left-color: var(--ink-light); opacity: 0.7; }
  .trip-card--upcoming { border-left-color: var(--red); }
  .trip-card--active   { border-left-color: #16A34A; }

  .trip-card__body { padding: 16px 18px 14px; }

  .trip-card__top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .trip-card__dest {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 800;
    font-style: italic;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1;
    letter-spacing: 0.01em;
    max-width: 240px;
  }

  .trip-card__badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .badge--upcoming { background: #FFF0EF; color: var(--red); border: 1px solid rgba(232,41,28,0.25); }
  .badge--active   { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
  .badge--complete { background: var(--off-white); color: var(--ink-light); border: 1px solid var(--border); }

  .trip-card__dates {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-light);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .trip-card__stats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .trip-stat {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-mid);
    background: var(--off-white);
    border-radius: 3px;
    padding: 4px 10px;
    border: 1px solid var(--border);
  }

  .trip-card__arrow {
    position: absolute;
    bottom: 14px;
    right: 16px;
    font-size: 16px;
    color: var(--ink-light);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
  }

  /* ── ADD CARD ── */
  .add-card {
    margin: 0 20px 12px;
    border: 2px dashed var(--border);
    padding: 20px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: default;
    opacity: 0.6;
  }

  .add-card__icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--off-white);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    color: var(--ink-light);
  }

  .add-card__text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-light);
  }

  .add-card__sub {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-light);
    margin-top: 2px;
    font-style: normal;
    font-family: 'Barlow', sans-serif;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 32px 20px 48px;
    text-align: center;
  }

  .footer-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    opacity: 0.5;
  }

</style>
</head>
<body>

<div class="app-header">
  <div class="header-eyebrow">Patricia Germain</div>
  <div class="header-title">My <span>Trips</span></div>
</div>

<div class="section-label">Upcoming</div>

<a href="summer-2026.html" class="trip-card trip-card--upcoming">
  <div class="trip-card__body">
    <div class="trip-card__top">
      <div class="trip-card__dest">Paris &amp; Portugal</div>
      <div class="trip-card__badge badge--upcoming">Upcoming</div>
    </div>
    <div class="trip-card__dates">Jul 7 – Jul 15, 2026 · 8 nights</div>
    <div class="trip-card__stats">
      <span class="trip-stat">🇫🇷 Paris</span>
      <span class="trip-stat">🇵🇹 Lagos</span>
      <span class="trip-stat">🇵🇹 Faro</span>
      <span class="trip-stat">🇵🇹 Porto</span>
    </div>
  </div>
  <div class="trip-card__arrow">→</div>
</a>

<div class="add-card">
  <div class="add-card__icon">+</div>
  <div>
    <div class="add-card__text">Add a trip</div>
    <div class="add-card__sub">Your next adventure goes here</div>
  </div>
</div>

<div class="footer">
  <div class="footer-text">Nomad · Travel Companion</div>
</div>

</body>
</html>
